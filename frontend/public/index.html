<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePackageManagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">

        <nav class="gamepackage-nav">
            <h2 class="headerTitle" translate="no">PackageGameManagement</h2>
            <ul class="nav-inner">
                <li class="nav-item"><span class="nav-label" translate="no">Steam</span></li>
                <li class="nav-item"><span class="nav-label" translate="no">Switch</span></li>
                <li class="nav-item"><span class="nav-label" translate="no">PS4</span></li>
                <li class="nav-item"><span class="nav-label" translate="no">PS5</span></li>
            </ul>
        </nav>
        <!-- <div class="PackageGameKinds"> -->
        <!-- </div> -->
    </header>

    <div class="game-card">
        <div id="CreateGameCard" class="card-blog-a create-game-card" "style="--order: 1;">
            <img class="create-img" src="http://127.0.0.1:3000/images/create_image.png" alt="新規作成画像"> 
            <div class="card-blog-content">
                <h3 class="card-title">+新規ゲーム追加</h3>
            </div>
        </div>
        <div id="GameCardList" class="game-card-list">
            <!-- ゲームカードがここに追加される --> 
        </div>
    </div>

<script src="./config.js" defer></script>
<script src="app.js"></script>
</body>
