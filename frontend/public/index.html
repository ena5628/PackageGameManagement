<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackageGameManagement</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
        <h1 class="headerTitle">PackageGameManagement</h1>
        <div class="PackageGameKinds">
            <nav class="PackageGameNav">
                <ul class="Nav-inner">
                    <li class="Nav_item borderLineRight"><span class="nav-label">Steam</span></li>
                    <li class="Nav_item borderLineRight"><span class="nav-label">Switch</span></li>
                    <li class="Nav_item borderLineRight"><span class="nav-label">PS4</span></li>
                    <li class="Nav_item"><span class="nav-label">PS5</span></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="GameCard">
        <div id="CreateGameCard" class="card-blog-a CreateGameCard" "style="--order: 1;">
            <img src="https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=300&q=200" alt="新規作成画像">
            <div class="card-blog-content">
                <h3 class="card-title">+新規ゲーム追加</h3>
            </div>
        </div>
        <div id="GameCardList" class="GameCardList">
            <!-- ゲームカードがここに追加される --> 
        </div>
    </div>


<script src="app.js"></script>
</body>
</html>
